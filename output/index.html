    <style>
        :root {
            --color-bg: #050A0E;
            --color-surface: #0A1628;
            --color-surface-glass: rgba(10, 22, 40, 0.6);
            --color-emerald: #00D37F;
            --color-emerald-dim: #00A862;
            --color-amber: #F59E0B;
            --color-amber-dim: #D97706;
            --color-text-primary: #F0F4F8;
            --color-text-secondary: #8899A6;
            --color-border: rgba(0, 211, 127, 0.15);
            
            --font-main: 'Geist', sans-serif;
            --font-heading: 'Cal Sans', sans-serif;
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        html, body {
            margin: 0;
            padding: 0;
            background: var(--color-bg);
            color: var(--color-text-primary);
            font-family: var(--font-main);
            overflow-x: hidden;
        }

        ::selection {
            background: var(--color-emerald);
            color: #000;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--color-emerald);
            border-radius: 10px;
        }

        /* Utility Classes */
        .section-label {
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--color-emerald);
            font-weight: 600;
        }

        .glass-card {
            background: var(--color-surface-glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--color-border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .btn-primary {
            background: var(--color-emerald);
            color: #000;
            font-family: var(--font-heading);
            border: none;
            border-radius: 8px;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        .btn-primary:hover {
            transform: scale(1.04);
            background: var(--color-emerald-dim);
        }

        .badge-ontrack {
            background: rgba(0, 211, 127, 0.15);
            color: var(--color-emerald);
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 500;
            border: 1px solid rgba(0, 211, 127, 0.2);
        }

        .badge-atrisk {
            background: rgba(245, 158, 11, 0.15);
            color: var(--color-amber);
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 500;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        /* Placeholder for canvas depth */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
